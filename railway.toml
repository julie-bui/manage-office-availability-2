# Railway config-as-code. Dashboard Start Command should match [deploy].
[build]
builder = "RAILPACK"

[deploy]
# --timeout 960: paid Railway high-RAM path. Must stay above
# BATCH_DEADLINE_SECONDS (default 900) so enrichment can finish unique
# Box/Drive PDFs before gunicorn SIGKILLs the worker.
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 960 --max-requests 20 --max-requests-jitter 5"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
