services:
  - type: web
    name: office-availability-consolidator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout 180: raised with Railway (was 120 for Render free-tier).
    # Multi-file batches with Box/Drive brochure PDFs need more wall-clock
    # for real embed extraction; BATCH_DEADLINE_SECONDS tracks under this.
    #
    # --max-requests 20: recycle often enough to bound RSS growth without the
    # thrash loop seen at max-requests 3 (worker restarting every request).
    # IMPORTANT: if the host Dashboard "Start Command" is set, it OVERRIDES
    # this file — update Railway/Render start command to match Procfile.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --max-requests 20 --max-requests-jitter 5
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        sync: false
