services:
  - type: web
    name: office-availability-consolidator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout 960: paid Railway high-RAM path (was 120/180 for Render/early
    # Railway). Must stay above BATCH_DEADLINE_SECONDS (default 900) so
    # multi-file Box/Drive brochure PDF embed extraction can finish.
    #
    # --max-requests 20: recycle often enough to bound RSS growth without the
    # thrash loop seen at max-requests 3 (worker restarting every request).
    # IMPORTANT: if the host Dashboard "Start Command" is set, it OVERRIDES
    # this file — update Railway/Render start command to match Procfile.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 960 --max-requests 20 --max-requests-jitter 5
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        sync: false
